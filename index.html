<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>DrawingApp</title>
  <link rel="stylesheet" href="css/styles.css?v=200">
</head>
<body>

  <!-- PAGE: Auth (unauthenticated entry) -->
  <div id="page-auth" class="page auth-page"></div>

  <!-- PAGE: For You -->
  <div id="page-foryou" class="page foryou-page"></div>

  <!-- PAGE: Home -->
  <div id="page-home" class="page"></div>

  <!-- PAGE: Exercise List (Assignments) -->
  <div id="page-exercises" class="page"></div>

  <!-- PAGE: Exercise Detail -->
  <div id="page-detail" class="page"></div>

  <!-- PAGE: Video Player -->
  <div id="page-video" class="page video-page"></div>

  <!-- PAGE: Article -->
  <div id="page-article" class="page"></div>

  <!-- PAGE: Search -->
  <div id="page-search" class="page"></div>

  <!-- PAGE: Search Results (sub-page of Browse) -->
  <div id="page-search-results" class="page"></div>

  <!-- PAGE: View All Inspiration (sub-page of Search Results) -->
  <div id="page-inspo-all" class="page"></div>

  <!-- PAGE: View All Exercises (sub-page of Search Results) -->
  <div id="page-exercises-all" class="page"></div>

  <!-- PAGE: Saved / Bookmarks -->
  <div id="page-bookmarks" class="page"></div>

  <!-- PAGE: Account -->
  <div id="page-account" class="page"></div>

  <!-- PAGE: Preferences -->
  <div id="page-preferences" class="page"></div>

  <!-- Global Bottom Nav Bar -->
  <nav id="bottom-nav" class="bottom-nav">
    <button class="bottom-nav__item pressable" data-page="foryou" onclick="handleBottomNav('foryou')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2.5C8.5 6.5 8 11 8 15h8c0-4-.5-8.5-4-12.5z"/>
        <path d="M8 15v3l4 3.5 4-3.5v-3"/>
        <path d="M8 15c-2.5 0-4 1.5-4 4h4"/>
        <path d="M16 15c2.5 0 4 1.5 4 4h-4"/>
        <circle cx="12" cy="10" r="1.5" fill="currentColor" stroke="none"/>
      </svg>
      <span>For You</span>
    </button>
    <button class="bottom-nav__item pressable" data-page="home" onclick="handleBottomNav('home')">
      <svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      <span>Home</span>
    </button>
    <button class="bottom-nav__item pressable" data-page="search" onclick="handleBottomNav('search')">
      <svg viewBox="0 0 24 24"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="15" y1="15" x2="21" y2="21" stroke="currentColor" stroke-width="1.5"/></svg>
      <span>Browse</span>
    </button>
    <button class="bottom-nav__item pressable" data-page="bookmarks" onclick="handleBottomNav('bookmarks')">
      <svg viewBox="0 0 24 24"><path d="M5 4h14v17l-7-4-7 4V4z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      <span>Saved</span>
    </button>
    <button class="bottom-nav__item pressable" data-page="assignments" onclick="handleBottomNav('assignments')">
      <svg viewBox="0 0 24 24"><path d="M4 6h7v12H4zM13 6h7v12h-7z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      <span>Exercises</span>
    </button>
  </nav>

  <!-- Global floating user avatar (authenticated pages only) -->
  <div id="global-user-pill"></div>

  <!-- Inspiration modal is created dynamically by openInspoModal() in app.js -->

  <!-- Firebase SDK (compat) — pointed at local emulators -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <script src="js/app.js?v=200"></script>
</body>
</html>
